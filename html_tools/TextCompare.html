<!-- 
现代化质感：采用了更柔和的背景色、圆角设计（Border-Radius）和轻量级阴影（Box-Shadow），整体看起来更像一个精致的现代 Web 应用。

内嵌 SVG 图标：没有引入外部图片或图标库，直接使用代码绘制了纯净的“说明”和“复制”图标，保证单文件的独立性。
 -->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本对比合并工具</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --accent-color: #0f766e;
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --text-main: #27272a;
            --text-muted: #71717a;
            --surface-soft: #f8fafc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 30px 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 28px;
            border: 1px solid rgba(228, 228, 231, 0.92);
            border-radius: 8px;
            box-shadow: 0 20px 45px -30px rgba(15, 23, 42, 0.32);
        }
        .header-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
        }
        h2 {
            margin: 0;
            color: var(--text-main);
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0;
        }
        
        /* 纯图标按钮统一样式 */
        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 8px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .icon-btn:hover {
            background: #f1f5f9;
            color: var(--primary-color);
        }
        .info-btn {
            margin-left: 10px;
        }

        .input-area {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .input-box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .input-box label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        textarea {
            width: 100%;
            height: 220px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
            box-sizing: border-box;
            font-family: "Fira Code", monospace;
            background-color: var(--surface-soft);
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
        }
        
        .action-area {
            text-align: center;
            margin-bottom: 25px;
        }
        .execute-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 12px 24px -18px rgba(37, 99, 235, 0.8);
            transition: all 0.2s ease;
        }
        .execute-btn:hover {
            background: linear-gradient(135deg, var(--primary-hover), #115e59);
            transform: translateY(-1px);
            box-shadow: 0 16px 30px -20px rgba(37, 99, 235, 0.9);
        }

        .result-area {
            display: flex;
            flex-direction: column;
        }
        .result-area label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        /* 结果框的外层容器，用于定位复制图标 */
        .result-wrapper {
            position: relative;
            width: 100%;
        }
        
        /* 右上角悬浮的复制按钮 */
        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: var(--card-bg);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            z-index: 2;
        }
        .copy-btn:hover {
            background-color: #f8fafc;
            color: var(--primary-color);
        }

        #resultBox {
            width: 100%;
            min-height: 250px;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--surface-soft);
            font-size: 14px;
            font-family: "Fira Code", monospace;
            white-space: pre-wrap;
            overflow-y: auto;
            box-sizing: border-box;
            line-height: 1.6;
        }
        
        /* 高亮样式优化 */
        .highlight-red {
            background-color: #fee2e2;
            color: #b91c1c;
            border-radius: 4px;
            padding: 2px 4px;
            margin: 0 2px;
        }
        .highlight-green {
            background-color: #dcfce7;
            color: #15803d;
            display: block;
            padding: 4px 8px;
            margin: 4px 0;
            border-radius: 6px;
            border-left: 4px solid #22c55e;
        }

        /* 提示信息 */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: rgba(30, 41, 59, 0.9);
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px 20px;
            position: fixed;
            z-index: 999;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%) translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 弹窗遮罩层 */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
        }
        /* 弹窗内容 */
        .modal-content {
            background-color: #fff;
            margin: 8% auto;
            padding: 30px 40px;
            border-radius: 8px;
            width: 80%;
            max-width: 550px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .close-btn:hover {
            background: #f1f5f9;
            color: var(--text-main);
        }
        .modal-content ul {
            line-height: 2;
            padding-left: 20px;
            color: #475569;
        }
        .modal-content li {
            margin-bottom: 10px;
        }
        @media (max-width: 760px) {
            body {
                padding: 18px 12px;
            }
            .container {
                padding: 20px;
            }
            .input-area {
                flex-direction: column;
            }
            textarea {
                height: 190px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2>文本对比合并工具</h2>
        <!-- 纯 Icon 的说明按钮 (使用 SVG) -->
        <button class="icon-btn info-btn" onclick="showRules()" title="运行规则说明">
            <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
        </button>
    </div>
    
    <div class="input-area">
        <div class="input-box">
            <label for="oldData">旧数据 (Old Data)</label>
            <textarea id="oldData" placeholder="在此粘贴旧数据..."></textarea>
        </div>
        <div class="input-box">
            <label for="newData">新数据 (New Data)</label>
            <textarea id="newData" placeholder="在此粘贴新数据..."></textarea>
        </div>
    </div>

    <div class="action-area">
        <button class="execute-btn" onclick="compareAndMerge()">执行对比并合并</button>
    </div>

    <div class="result-area">
        <label>合并结果预览</label>
        <!-- 带有相对定位的外层，让复制按钮悬浮在右上角 -->
        <div class="result-wrapper">
            <!-- 纯 Icon 的复制按钮 (使用 SVG) -->
            <button class="icon-btn copy-btn" onclick="copyResult()" title="一键复制纯文本">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
            <div id="resultBox"></div>
        </div>
    </div>
</div>

<div id="toast">✅ 结果已复制到剪贴板！</div>

<!-- 规则说明弹窗 -->
<div id="ruleModal" class="modal">
    <div class="modal-content">
        <!-- 弹窗关闭 Icon -->
        <svg class="close-btn" onclick="closeRules()" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
        <h3 style="margin-top: 0; color: var(--text-main);">⚙️ 运行规则说明</h3>
        <ul>
            <li><strong>空行处理：</strong>自动忽略新旧数据中为空白的行。</li>
            <li><strong>部分高亮（红）：</strong>将新数据行与旧数据逐行对比。若旧数据包含新数据，则将其包含的关键词部分标记为<span class="highlight-red">红色背景</span>。</li>
            <li><strong>末尾追加（绿）：</strong>若新数据中的某一行在所有旧数据中都<strong>未找到匹配项</strong>，则将其插入到结果页最末尾，并标记为<span class="highlight-green" style="display:inline; border-left:none; padding:2px 4px;">绿色背景</span>。</li>
            <li><strong>结果输出：</strong>结果页以旧数据为主合并。点击右上角的“复制图标”可获得不带颜色的纯净文本。</li>
        </ul>
    </div>
</div>

<script>
    // HTML特殊字符转义
    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    function compareAndMerge() {
        const oldText = document.getElementById('oldData').value;
        const newText = document.getElementById('newData').value;

        const oldLines = oldText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
        const newLines = newText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);

        let resultHtml = "";
        let matchedNewLinesIndex = new Set();

        for (let i = 0; i < oldLines.length; i++) {
            let currentOldLine = oldLines[i];
            let intervals = [];

            for (let j = 0; j < newLines.length; j++) {
                let newLine = newLines[j];
                let startIndex = 0;
                while ((startIndex = currentOldLine.indexOf(newLine, startIndex)) > -1) {
                    intervals.push([startIndex, startIndex + newLine.length]);
                    matchedNewLinesIndex.add(j); 
                    startIndex += newLine.length;
                }
            }

            intervals.sort((a, b) => a[0] - b[0]);
            let mergedIntervals = [];
            if (intervals.length > 0) {
                let currentInterval = intervals[0];
                for (let k = 1; k < intervals.length; k++) {
                    if (intervals[k][0] <= currentInterval[1]) {
                        currentInterval[1] = Math.max(currentInterval[1], intervals[k][1]);
                    } else {
                        mergedIntervals.push(currentInterval);
                        currentInterval = intervals[k];
                    }
                }
                mergedIntervals.push(currentInterval);
            }

            let htmlLine = "";
            let lastIdx = 0;
            for (let m = 0; m < mergedIntervals.length; m++) {
                let start = mergedIntervals[m][0];
                let end = mergedIntervals[m][1];
                
                htmlLine += escapeHtml(currentOldLine.substring(lastIdx, start));
                htmlLine += `<span class="highlight-red">${escapeHtml(currentOldLine.substring(start, end))}</span>`;
                lastIdx = end;
            }
            htmlLine += escapeHtml(currentOldLine.substring(lastIdx));

            resultHtml += `<div>${htmlLine}</div>`;
        }

        for (let j = 0; j < newLines.length; j++) {
            if (!matchedNewLinesIndex.has(j)) {
                let newLine = newLines[j];
                resultHtml += `<div class="highlight-green">${escapeHtml(newLine)}</div>`;
            }
        }

        document.getElementById('resultBox').innerHTML = resultHtml;
    }

    function copyResult() {
        const resultBox = document.getElementById('resultBox');
        const textToCopy = resultBox.innerText;

        if (!textToCopy.trim()) {
            showToast("⚠️ 结果为空，无需复制");
            return;
        }

        navigator.clipboard.writeText(textToCopy).then(() => {
            showToast("✅ 结果已复制到剪贴板！");
        }).catch(err => {
            console.error('复制失败:', err);
            showToast("❌ 复制失败，请手动框选复制");
        });
    }

    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = "show";
        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
    }

    // === 弹窗控制逻辑 ===
    function showRules() {
        document.getElementById('ruleModal').style.display = 'block';
    }

    function closeRules() {
        document.getElementById('ruleModal').style.display = 'none';
    }

    // 点击弹窗外部（灰色遮罩层）时自动关闭弹窗
    window.onclick = function(event) {
        const modal = document.getElementById('ruleModal');
        if (event.target === modal) {
            modal.style.display = 'none';
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本去重工具</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --accent-color: #0f766e;
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --text-main: #27272a;
            --text-muted: #71717a;
            --surface-soft: #f8fafc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 30px 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 28px;
            border: 1px solid rgba(228, 228, 231, 0.92);
            border-radius: 8px;
            box-shadow: 0 20px 45px -30px rgba(15, 23, 42, 0.32);
        }
        .header-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
        }
        h2 {
            margin: 0;
            color: var(--text-main);
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0;
        }
        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 8px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .icon-btn:hover {
            background: #f1f5f9;
            color: var(--primary-color);
        }
        .info-btn {
            margin-left: 10px;
        }
        .input-area {
            display: flex;
            flex-direction: column;
            margin-bottom: 18px;
        }
        .input-area label,
        .result-area label,
        .duplicate-area label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
            box-sizing: border-box;
            font-family: "Fira Code", Consolas, monospace;
            background-color: var(--surface-soft);
            transition: border-color 0.3s;
            line-height: 1.55;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
        }
        .action-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }
        .execute-btn,
        .secondary-btn {
            border: none;
            padding: 12px 26px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .execute-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            box-shadow: 0 12px 24px -18px rgba(37, 99, 235, 0.8);
        }
        .execute-btn:hover {
            background: linear-gradient(135deg, var(--primary-hover), #115e59);
            transform: translateY(-1px);
            box-shadow: 0 16px 30px -20px rgba(37, 99, 235, 0.9);
        }
        .secondary-btn {
            background: #eef2f7;
            color: #475569;
        }
        .secondary-btn:hover {
            background: #e2e8f0;
            color: #1f2937;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }
        .stat-card {
            background: var(--surface-soft);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 16px;
        }
        .stat-value {
            display: block;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
        }
        .stat-label {
            display: block;
            margin-top: 4px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .output-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 20px;
        }
        .result-area,
        .duplicate-area {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .result-wrapper {
            position: relative;
            width: 100%;
            min-width: 0;
        }
        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: var(--card-bg);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            z-index: 2;
        }
        .copy-btn:hover {
            background-color: #f8fafc;
            color: var(--primary-color);
        }
        #resultBox,
        #duplicateBox {
            width: 100%;
            min-height: 260px;
            max-height: 520px;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--surface-soft);
            font-size: 14px;
            font-family: "Fira Code", Consolas, monospace;
            white-space: normal;
            overflow: auto;
            box-sizing: border-box;
            line-height: 1.45;
        }
        #resultBox {
            padding-right: 54px;
        }
        .line-row {
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr);
            gap: 8px;
            align-items: start;
            padding: 1px 8px;
            margin: 1px 0;
            border-radius: 6px;
            border-left: 4px solid transparent;
        }
        .line-number {
            color: #94a3b8;
            font-variant-numeric: tabular-nums;
            text-align: right;
            user-select: none;
            border-right: 1px solid #e2e8f0;
            padding-right: 10px;
        }
        .line-content {
            min-width: 0;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }
        .line-unique {
            background-color: #ecfdf5;
            color: #166534;
            border-left-color: #22c55e;
        }
        .line-duplicate {
            background-color: #fee2e2;
            color: #b91c1c;
            border-left-color: #ef4444;
        }
        .empty-state {
            color: var(--text-muted);
        }
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: rgba(30, 41, 59, 0.9);
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px 20px;
            position: fixed;
            z-index: 999;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%) translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: #fff;
            margin: 8% auto;
            padding: 30px 40px;
            border-radius: 8px;
            width: 80%;
            max-width: 550px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .close-btn:hover {
            background: #f1f5f9;
            color: var(--text-main);
        }
        .modal-content ul {
            line-height: 2;
            padding-left: 20px;
            color: #475569;
        }
        .modal-content li {
            margin-bottom: 10px;
        }
        @media (max-width: 900px) {
            .output-grid,
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 760px) {
            body {
                padding: 18px 12px;
            }
            .container {
                padding: 20px;
            }
            textarea {
                height: 210px;
            }
            .modal-content {
                width: auto;
                margin: 18% 16px;
                padding: 26px 28px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2>文本去重工具</h2>
        <button class="icon-btn info-btn" onclick="showRules()" title="运行规则说明">
            <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
        </button>
    </div>

    <div class="input-area">
        <label for="sourceData">原始数据 (Raw Data)</label>
        <textarea id="sourceData" placeholder="在此粘贴待去重文本，每行一条数据..."></textarea>
    </div>

    <div class="action-area">
        <button class="execute-btn" onclick="deduplicateText()">执行去重</button>
        <button class="secondary-btn" onclick="clearAll()">清空</button>
    </div>

    <div class="stats-grid" aria-label="去重统计">
        <div class="stat-card">
            <span class="stat-value" id="totalCount">0</span>
            <span class="stat-label">有效行数</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="uniqueCount">0</span>
            <span class="stat-label">去重后行数</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="duplicateCount">0</span>
            <span class="stat-label">重复行数</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="groupCount">0</span>
            <span class="stat-label">重复项种类</span>
        </div>
    </div>

    <div class="output-grid">
        <div class="result-area">
            <label>去重结果预览</label>
            <div class="result-wrapper">
                <button class="icon-btn copy-btn" onclick="copyResult()" title="一键复制去重结果">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
                <div id="resultBox"><span class="empty-state">去重结果会显示在这里。</span></div>
            </div>
        </div>

        <div class="duplicate-area">
            <label>重复数据高亮预览</label>
            <div id="duplicateBox"><span class="empty-state">重复行会以红色高亮显示。</span></div>
        </div>
    </div>
</div>

<div id="toast">结果已复制到剪贴板！</div>

<div id="ruleModal" class="modal">
    <div class="modal-content">
        <svg class="close-btn" onclick="closeRules()" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
        <h3 style="margin-top: 0; color: var(--text-main);">运行规则说明</h3>
        <ul>
            <li><strong>去重单位：</strong>以每一行作为一条完整数据进行去重。</li>
            <li><strong>空行处理：</strong>自动忽略空白行，省得空行混进结果里捣乱。</li>
            <li><strong>空格处理：</strong>去掉每行首尾空格后参与比较，输出也使用清理后的文本。</li>
            <li><strong>保留规则：</strong>保留首次出现的数据，后续重复行会在高亮预览中标记为红色。</li>
            <li><strong>行号展示：</strong>结果预览左侧显示行号，复制结果时不会带上行号。</li>
            <li><strong>结果复制：</strong>点击右上角复制图标，可复制不带颜色的纯文本去重结果。</li>
        </ul>
    </div>
</div>

<script>
    let deduplicatedText = "";

    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    function deduplicateText() {
        const sourceText = document.getElementById('sourceData').value;
        const lines = sourceText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
        const seenLines = new Set();
        const duplicateGroups = new Set();
        const uniqueLines = [];
        let resultRowsHtml = "";
        let duplicateRowsHtml = "";
        let duplicateCount = 0;

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const escapedLine = escapeHtml(line);

            if (seenLines.has(line)) {
                duplicateCount++;
                duplicateGroups.add(line);
                duplicateRowsHtml += renderNumberedLine(i + 1, escapedLine, 'line-duplicate');
                continue;
            }

            seenLines.add(line);
            uniqueLines.push(line);
            resultRowsHtml += renderNumberedLine(uniqueLines.length, escapedLine, '');
            duplicateRowsHtml += renderNumberedLine(i + 1, escapedLine, 'line-unique');
        }

        deduplicatedText = uniqueLines.join('\n');
        document.getElementById('resultBox').innerHTML = resultRowsHtml;
        document.getElementById('duplicateBox').innerHTML = duplicateRowsHtml || '<span class="empty-state">暂无有效数据。</span>';
        document.getElementById('totalCount').innerText = lines.length;
        document.getElementById('uniqueCount').innerText = uniqueLines.length;
        document.getElementById('duplicateCount').innerText = duplicateCount;
        document.getElementById('groupCount').innerText = duplicateGroups.size;

        if (!lines.length) {
            document.getElementById('resultBox').innerHTML = '<span class="empty-state">去重结果会显示在这里。</span>';
            showToast("没有可处理的数据");
            return;
        }

        showToast(`去重完成：移除 ${duplicateCount} 行重复数据`);
    }

    function renderNumberedLine(lineNumber, lineHtml, rowClass) {
        const extraClass = rowClass ? ` ${rowClass}` : '';
        return `
            <div class="line-row${extraClass}">
                <span class="line-number" aria-hidden="true">${lineNumber}</span>
                <span class="line-content">${lineHtml}</span>
            </div>
        `;
    }

    function clearAll() {
        document.getElementById('sourceData').value = "";
        document.getElementById('resultBox').innerHTML = '<span class="empty-state">去重结果会显示在这里。</span>';
        document.getElementById('duplicateBox').innerHTML = '<span class="empty-state">重复行会以红色高亮显示。</span>';
        document.getElementById('totalCount').innerText = "0";
        document.getElementById('uniqueCount').innerText = "0";
        document.getElementById('duplicateCount').innerText = "0";
        document.getElementById('groupCount').innerText = "0";
        deduplicatedText = "";
    }

    function copyResult() {
        if (!deduplicatedText.trim()) {
            showToast("结果为空，无需复制");
            return;
        }

        navigator.clipboard.writeText(deduplicatedText).then(() => {
            showToast("结果已复制到剪贴板！");
        }).catch(err => {
            console.error('复制失败:', err);
            showToast("复制失败，请手动框选复制");
        });
    }

    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = "show";
        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function showRules() {
        document.getElementById('ruleModal').style.display = 'block';
    }

    function closeRules() {
        document.getElementById('ruleModal').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('ruleModal');
        if (event.target === modal) {
            modal.style.display = 'none';
        }
    }
</script>

</body>
</html>

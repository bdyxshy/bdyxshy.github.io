<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网址批量打开工具</title>
    <style>
        /* 复用上一个工具的完整 UI 变量和样式 */
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --accent-color: #0f766e;
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --text-main: #27272a;
            --text-muted: #71717a;
            --surface-soft: #f8fafc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 30px 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
        }
        .container {
            max-width: 900px; /* 稍微调窄一点，更适合单列文本框 */
            margin: 0 auto;
            background: var(--card-bg);
            padding: 28px;
            border: 1px solid rgba(228, 228, 231, 0.92);
            border-radius: 8px;
            box-shadow: 0 20px 45px -30px rgba(15, 23, 42, 0.32);
        }
        .header-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
        }
        h2 {
            margin: 0;
            color: var(--text-main);
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0;
        }
        
        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 8px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .icon-btn:hover {
            background: #f1f5f9;
            color: var(--primary-color);
        }
        .info-btn {
            margin-left: 10px;
        }

        .input-area {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        .input-area label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
            box-sizing: border-box;
            font-family: "Fira Code", monospace;
            background-color: var(--surface-soft);
            transition: border-color 0.3s;
            line-height: 1.5;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
        }
        
        .action-area {
            text-align: center;
            margin-bottom: 25px;
        }
        .execute-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 12px 24px -18px rgba(37, 99, 235, 0.8);
            transition: all 0.2s ease;
        }
        .execute-btn:hover {
            background: linear-gradient(135deg, var(--primary-hover), #115e59);
            transform: translateY(-1px);
            box-shadow: 0 16px 30px -20px rgba(37, 99, 235, 0.9);
        }

        .result-area {
            display: flex;
            flex-direction: column;
        }
        .result-area label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .result-wrapper {
            position: relative;
            width: 100%;
        }

        #resultBox {
            width: 100%;
            min-height: 150px;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--surface-soft);
            font-size: 14px;
            font-family: "Fira Code", monospace;
            white-space: pre-wrap;
            overflow-y: auto;
            box-sizing: border-box;
            line-height: 1.6;
        }
        
        .url-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            padding: 6px 10px;
            background-color: #e0f2fe;
            color: #075985;
            border-radius: 6px;
            word-break: break-all;
        }
        .url-item::before {
            content: '🔗';
            margin-right: 8px;
            font-size: 12px;
        }

        /* 提示信息 */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: rgba(30, 41, 59, 0.9);
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px 20px;
            position: fixed;
            z-index: 999;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%) translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 30px 40px;
            border-radius: 8px;
            width: 80%;
            max-width: 550px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .close-btn:hover {
            background: #f1f5f9;
            color: var(--text-main);
        }
        .modal-content ul {
            line-height: 2;
            padding-left: 20px;
            color: #475569;
        }
        .modal-content li {
            margin-bottom: 10px;
        }
        .warning-text {
            color: #b91c1c;
            background: #fee2e2;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 15px;
        }
        @media (max-width: 760px) {
            body {
                padding: 18px 12px;
            }
            .container {
                padding: 20px;
            }
            textarea {
                height: 190px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2>网址批量打开工具</h2>
        <!-- 纯 Icon 的说明按钮 -->
        <button class="icon-btn info-btn" onclick="showRules()" title="运行规则说明">
            <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
        </button>
    </div>
    
    <div class="input-area">
        <label for="urlData">网址列表 (每行一个，自动过滤空格后的内容)</label>
        <textarea id="urlData" placeholder=""></textarea>
    </div>

    <div class="action-area">
        <button class="execute-btn" onclick="openAllUrls()">一键批量打开</button>
    </div>

    <div class="result-area">
        <label>实际提取并打开的网址记录</label>
        <div class="result-wrapper">
            <div id="resultBox">
                <span style="color: #94a3b8; font-style: italic;">点击上方按钮后，这里会显示成功提取的纯净网址列表...</span>
            </div>
        </div>
    </div>
</div>

<div id="toast">✅ 提示内容</div>

<!-- 规则说明弹窗 -->
<div id="ruleModal" class="modal">
    <div class="modal-content">
        <svg class="close-btn" onclick="closeRules()" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
        <h3 style="margin-top: 0; color: var(--text-main);">⚙️ 运行规则说明</h3>
        <ul>
            <li><strong>自动过滤空行：</strong>工具会自动忽略您输入的空白行。</li>
            <li><strong>智能截取：</strong>以 <strong>空格</strong> 为界限，自动提取每行最前面的内容作为网址。空格后面的所有内容（如状态、注释、账号密码、多余网址）都会被丢弃。</li>
            <li><strong>批量打开：</strong>提取成功后，会自动在浏览器中同时开启多个新标签页。</li>
        </ul>
        <div class="warning-text">
            <strong>⚠️ 浏览器拦截提示：</strong><br>
            出于安全机制，浏览器通常会拦截同时打开的多个窗口。请在点击后，注意查看浏览器右上角地址栏是否有“已拦截弹出式窗口”的红色图标，点击它并选择<strong>“始终允许显示弹出窗口”</strong>即可正常使用。
        </div>
    </div>
</div>

<script>
    function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    function openAllUrls() {
        const rawText = document.getElementById('urlData').value;
        const lines = rawText.split(/\r?\n/);
        
        let validUrls = [];

        // 1. 解析数据
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue; // 忽略空行

            // 核心逻辑：按空白字符分割，只取第一个元素
            let pureUrl = line.split(/\s+/)[0];

            // 简单校验一下是否包含协议头，如果不包含稍微补全一下（虽然您的示例里都有）
            if (pureUrl) {
                if (!pureUrl.startsWith('http://') && !pureUrl.startsWith('https://')) {
                    pureUrl = 'http://' + pureUrl;
                }
                validUrls.push(pureUrl);
            }
        }

        // 2. 边界处理
        if (validUrls.length === 0) {
            showToast("⚠️ 没有检测到有效的网址");
            return;
        }
        if (validUrls.length > 30) {
            if(!confirm(`您将一次性打开 ${validUrls.length} 个网页，这可能会导致电脑卡顿。确定要继续吗？`)){
                return;
            }
        }

        // 3. 渲染提取结果记录
        let resultHtml = "";
        validUrls.forEach(url => {
            resultHtml += `<div class="url-item">${escapeHtml(url)}</div>`;
        });
        document.getElementById('resultBox').innerHTML = resultHtml;

        // 4. 执行批量打开
        let openedCount = 0;
        validUrls.forEach(url => {
            // 打开新标签页
            let newWin = window.open(url, '_blank');
            if (newWin) {
                openedCount++;
            }
        });

        // 5. 结果提示
        if (openedCount === 0) {
            showToast("❌ 窗口被浏览器拦截！请在地址栏允许弹出窗口");
        } else if (openedCount < validUrls.length) {
            showToast(`⚠️ 尝试打开 ${validUrls.length} 个，实际打开 ${openedCount} 个 (部分可能被拦截)`);
        } else {
            showToast(`✅ 成功批量打开 ${openedCount} 个网页！`);
        }
    }

    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = "show";
        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
    }

    // === 弹窗控制逻辑 ===
    function showRules() {
        document.getElementById('ruleModal').style.display = 'block';
    }

    function closeRules() {
        document.getElementById('ruleModal').style.display = 'none';
    }

    // 点击弹窗外部时自动关闭弹窗
    window.onclick = function(event) {
        const modal = document.getElementById('ruleModal');
        if (event.target === modal) {
            modal.style.display = 'none';
        }
    }
</script>

</body>
</html>

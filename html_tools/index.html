<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的效率工具箱</title>
    <style>
        :root {
            --sidebar-bg: #18181b;
            --sidebar-hover: #27272a;
            --sidebar-active: #2563eb;
            --sidebar-active-soft: rgba(37, 99, 235, 0.22);
            --text-light: #f8fafc;
            --text-muted: #a1a1aa;
            --main-bg: #f5f7fb;
            --panel-bg: rgba(255, 255, 255, 0.82);
            --border-color: #e5e7eb;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--main-bg);
        }
        
        /* === 左侧侧边栏 === */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(15, 23, 42, 0.12);
            z-index: 10;
            transition: width 0.22s ease;
            overflow: hidden;
        }
        .sidebar.collapsed {
            width: 78px;
        }
        .logo-area {
            height: 64px;
            padding: 0 18px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-sizing: border-box;
            white-space: nowrap;
        }
        .logo-area svg {
            flex: 0 0 auto;
            color: #60a5fa;
        }
        .logo-text {
            transition: opacity 0.16s ease, transform 0.16s ease;
        }
        .sidebar.collapsed .logo-text,
        .sidebar.collapsed .nav-label {
            display: none;
            opacity: 0;
            transform: translateX(-6px);
            pointer-events: none;
        }
        .sidebar.collapsed .logo-area {
            justify-content: center;
            padding: 0;
        }
        .nav-list {
            list-style: none;
            padding: 16px 10px;
            margin: 0;
            flex: 1;
            overflow-y: auto;
        }
        .nav-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
            border: 1px solid transparent;
        }
        .nav-item:hover {
            background-color: var(--sidebar-hover);
            color: var(--text-light);
        }
        .nav-item.active {
            background: linear-gradient(135deg, var(--sidebar-active), #0f766e);
            color: var(--text-light);
            box-shadow: 0 12px 24px -16px rgba(37, 99, 235, 0.9);
            border-color: rgba(255,255,255,0.16);
        }
        .nav-item svg {
            flex: 0 0 auto;
        }
        .nav-label {
            transition: opacity 0.16s ease, transform 0.16s ease;
        }
        .sidebar.collapsed .nav-item {
            justify-content: center;
            padding: 12px 0;
        }
        .sidebar.collapsed .nav-item:hover {
            background-color: var(--sidebar-hover);
        }
        
        /* === 右侧主内容区 === */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .top-bar {
            height: 60px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 18px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
            z-index: 5;
            backdrop-filter: blur(14px);
        }
        .sidebar-toggle {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fff;
            color: #52525b;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .sidebar-toggle:hover {
            color: #2563eb;
            border-color: #bfdbfe;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.12);
        }
        .current-tool-title {
            font-size: 18px;
            font-weight: 600;
            color: #27272a;
        }
        
        /* iframe 容器 */
        .iframe-container {
            flex: 1;
            width: 100%;
            height: 100%;
            background-color: var(--main-bg);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 欢迎页空状态 */
        #welcomeState {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
        }
        #welcomeState svg {
            margin-bottom: 20px;
            color: #cbd5e1;
        }

        @media (max-width: 760px) {
            .sidebar {
                width: 78px;
            }
            .logo-text,
            .nav-label {
                display: none;
            }
            .logo-area,
            .nav-item {
                justify-content: center;
            }
            .nav-item {
                padding: 12px 0;
            }
        }
    </style>
</head>
<body>

    <!-- 左侧导航栏 -->
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                <polyline points="2 17 12 22 22 17"></polyline>
                <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
            <span class="logo-text">效率工具箱</span>
        </div>
        <ul class="nav-list">
            <!-- 菜单项：绑定了 onclick 事件来切换 iframe 路径 -->
            <li class="nav-item" onclick="switchTool(this, 'TextCompare.html', '文本对比合并')" title="文本对比合并">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <span class="nav-label">文本对比合并</span>
            </li>
            
            <li class="nav-item" onclick="switchTool(this, 'UrlBatchOpener.html', '网址批量打开')" title="网址批量打开">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                <span class="nav-label">网址批量打开</span>
            </li>

            <li class="nav-item" onclick="switchTool(this, 'JsonFormatter.html', 'JSON格式化提取')" title="JSON格式化提取">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline><line x1="13" y1="4" x2="11" y2="20"></line></svg>
                <span class="nav-label">JSON格式化提取</span>
            </li>

            <!-- 未来增加新工具，只需复制上面的 <li> 标签，修改文件名和名称即可 -->
        </ul>
    </div>

    <!-- 右侧内容区 -->
    <div class="main-content">
        <div class="top-bar">
            <button class="sidebar-toggle" onclick="toggleSidebar()" title="展开/收起侧边栏" aria-label="展开或收起侧边栏">
                <svg id="toggleIcon" viewBox="0 0 24 24" width="19" height="19" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <span class="current-tool-title" id="topTitle">欢迎使用</span>
        </div>
        
        <div class="iframe-container">
            <!-- 初始状态显示欢迎画面 -->
            <div id="welcomeState">
                <svg viewBox="0 0 24 24" width="80" height="80" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <h2>请从左侧选择一个工具开始</h2>
            </div>
            
            <!-- iframe 用于加载实际的工具页面，默认隐藏 -->
            <iframe id="toolFrame" style="display: none;"></iframe>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        function switchTool(element, fileUrl, toolName) {
            // 1. 更新侧边栏高亮状态
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            // 2. 更新顶部标题
            document.getElementById('topTitle').innerText = toolName;

            // 3. 隐藏欢迎页面，显示并加载 iframe
            const welcomeState = document.getElementById('welcomeState');
            const toolFrame = document.getElementById('toolFrame');
            
            welcomeState.style.display = 'none';
            toolFrame.style.display = 'block';
            toolFrame.src = fileUrl; // 加载对应的 HTML 文件
        }
    </script>
</body>
</html>

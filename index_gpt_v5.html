                text = msg.thinking + '\n\n' + text;
            }
            await this.copyText(text, button);
        },
        async copyText(text, button, copiedLabel = '已复制') {
            try {
                await navigator.clipboard.writeText(text);

                if (button) {
                    const old = button.textContent;
                    button.textContent = copiedLabel;
                    button.classList.add('copied');

                    setTimeout(() => {
                        button.textContent = old;
                        button.classList.remove('copied');
                    }, 1300);
                }
            } catch (err) {
                this.showNotification('复制失败', '浏览器不允许访问剪贴板。');
            }
        },
        async copyCodeBlock(button) {
            const wrapper = button.closest('.code-block');
            const code = wrapper ? wrapper.querySelector('pre code') : null;
            const text = code ? code.innerText : '';

            if (!text) return;

            await this.copyText(text, button, '✓');
        },
        resendMessage(index) {
            if (this.isStreaming) {
                this.showNotification('正在回复', '请先停止或等待当前回复结束。');
                return;
            }

            const conv = this.getCurrentConversation();
            const msg = conv?.messages?.[index];

            if (!msg || msg.role !== 'user') return;

            this.submitMessage(msg.content || '', {
                attachments: msg.attachments || []
            });
        },
        async sendMessage() {
            const now = Date.now();

            if (this.isStreaming) {
                // 如果距离上次点击不足 500ms，忽略此次操作，防止连击误杀
                if (now - this.lastSendTime < 500) return;

                if (this.abortController) {
                    this.abortController.abort();
                    console.warn("用户中止了请求");
                }
                return;
            }

            // 记录本次发送开始的时间点
            this.lastSendTime = now;
            if (this.isStreaming) {
                if (this.abortController) this.abortController.abort();
                return;
            }

            const inputEl = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const userText = (inputEl.value || '').trim();

            if (!userText && (!this.pendingFiles || !this.pendingFiles.length)) return;
            if (!this.settings.apiKey || !this.settings.apiUrl || !this.settings.apiModel) {
                this.showNotification('缺少配置', '请先在设置中填写 API URL、API Key 和模型。');
                return;
            }

            let conversation = this.getCurrentConversation();
            if (!conversation) {
                this.createNewConversation();
                conversation = this.getCurrentConversation();
            }

            // 组装用户消息（含文件摘要）
            let finalUserContent = userText;
            if (this.pendingFiles && this.pendingFiles.length) {
                const fileText = this.pendingFiles.map((f, i) => {
                    return `\n\n[文件 ${i + 1}] 名称：${f.name}\n内容：\n${f.content || ''}\n`;
                }).join('');
                finalUserContent = (userText || '请结合以下文件内容回答：') + '\n' + fileText;
            }

            const userMsg = {
                role: 'user',
                content: finalUserContent,
                createdAt: new Date().toISOString()
            };
            conversation.messages.push(userMsg);

            const assistantMsg = {
                role: 'assistant',
                content: '',
                createdAt: new Date().toISOString()
            };
            conversation.messages.push(assistantMsg);

            // 首条消息自动标题
            if (conversation.title === '新对话' && userText) {
                conversation.title = userText.slice(0, 18);
            }

            this.saveConversations();
            this.renderConversationList();
            this.renderMessages();

            // UI 状态
            this.isStreaming = true;
            this.abortController = new AbortController();
            sendBtn.classList.add('stop');
            sendBtn.textContent = '停止';
            inputEl.value = '';
            this.autoResizeTextarea();
            this.clearPendingFiles?.();

            try {
                // 原有的提取历史消息逻辑
                let historyMessages = conversation.messages
                    .slice(0, -1) // 去掉最后这个空 assistant
                    .map(m => ({ role: m.role, content: m.content }));

                // 【核心新增】根据设置限制携带数量
                const limit = parseInt(this.settings.historyCount, 10) || 0;
                if (limit > 0 && historyMessages.length > limit) {
                    // 使用 slice 截取数组末尾的 limit 条记录
                    historyMessages = historyMessages.slice(-limit);
                }
                // 获取当前会话专属 Prompt，如果没有则回退到默认的 HTML prompt
                const currentSystemPrompt = conversation.systemPrompt || this.buildFormatSystemPrompt();

                const payload = {
                    model: this.settings.apiModel,
                    stream: true,
                    messages: [
                        { role: 'system', content: currentSystemPrompt }, // 动态注入
                        ...historyMessages
                    ]
                };

                const res = await fetch(this.settings.apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // 兼容 OpenAI 常见写法
                        'Authorization': this.settings.apiKey.startsWith('Bearer ')
                            ? this.settings.apiKey
                            : `Bearer ${this.settings.apiKey}`
                    },
                    body: JSON.stringify(payload),
                    signal: this.abortController.signal
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                // 流式读取
                const reader = res.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let done = false;
                let buffer = '';

                while (!done) {
                    const { value, done: streamDone } = await reader.read();
                    done = streamDone;
                    buffer += decoder.decode(value || new Uint8Array(), { stream: !done });

                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const lineRaw of lines) {
                        const line = lineRaw.trim();
                        if (!line.startsWith('data:')) continue;
                        const data = line.replace(/^data:\s*/, '');
                        if (data === '[DONE]') continue;

                        try {
                            const json = JSON.parse(data);
                            const delta = json?.choices?.[0]?.delta?.content || '';
                            if (delta) {
                                assistantMsg.content += delta;

                                // 增量渲染（先快速纯文本，结束后再完整安全渲染）
                                this.renderMessages(false); 
                            }
                        } catch (e) {
                            // 忽略非 JSON 分片
                        }
                    }
                }

                // 完成后做一次完整渲染（Markdown + HTML净化 + 复制按钮）
                this.saveConversations();
                this.renderMessages(true);
            } catch (err) {
                if (err.name !== 'AbortError') {
                    assistantMsg.content = assistantMsg.content || `请求失败：${err.message}`;
                    this.saveConversations();
                    this.renderMessages(true);
                    this.showNotification('请求失败', err.message || '未知错误');
                }
            } finally {
                this.isStreaming = false;
                this.abortController = null;
                sendBtn.classList.remove('stop');
                sendBtn.textContent = '发送';
            }
        },

        async submitMessage(message, options = {}) {
            const text = String(message || '').trim();

            if (!text && !this.pendingFiles.length && !options.attachments?.length) return;

            if (!this.settings.apiKey) {
                this.openSettings();
                this.showNotification('需要 API Key', '请先在设置中填写 API Key。');
                return;
            }

            if (!this.settings.apiModel) {
                this.openSettings();
                this.showNotification('需要模型', '请先选择或输入 AI 模型。');
                return;
            }

            let conv = this.getCurrentConversation();

            if (!conv) {
                this.createNewConversation();
                conv = this.getCurrentConversation();
            }

            let attachments = options.attachments || [];

            try {
                if (!attachments.length && this.pendingFiles.length) {
                    this.setPreparingFilesUI(true);
                    attachments = await this.prepareLocalAttachments();
                    this.clearPendingFiles();
                }
            } catch (error) {
                this.setPreparingFilesUI(false);
                this.showNotification('文件读取失败', error.message);
                return;
            }

            this.setPreparingFilesUI(false);

            conv.messages.push({
                role: 'user',
                content: text || '请分析我上传的文件。',
                attachments
            });

            if (conv.messages.length === 1 || conv.title === '新对话' || conv.title === 'New Chat') {
                conv.title = (text || attachments[0]?.name || '文件对话').slice(0, 32);
            }

            this.saveConversations();
            this.renderConversationList();
            this.renderMessages();

            this.setStreamingUI(true);
            await this.streamAIResponse(conv);
            this.setStreamingUI(false);

            this.saveConversations();
            this.renderConversationList();
            this.renderMessages();
        },

        setPreparingFilesUI(active) {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');

            if (!input || !btn) return;

            input.disabled = active;
            btn.disabled = active;
            btn.textContent = active ? '读取文件中' : '发送';
        },

        setUploadingUI(active) {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');

            if (!input || !btn) return;

            input.disabled = active;
            btn.disabled = active;
            btn.textContent = active ? '上传中' : '发送';
        },
        setStreamingUI(active) {
            this.isStreaming = active;
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            input.disabled = active;
            btn.textContent = active ? '停止' : '发送';
            btn.classList.toggle('stop', active);
            if (!active) input.focus();
        },
        buildApiMessages(conv) {
            return conv.messages
                .filter(msg => msg.role === 'user' || msg.role === 'assistant' || msg.role === 'system')
                .map(msg => {
                    if (msg.role === 'user') {
                        const fileContext = this.buildAttachmentPrompt(msg.attachments || []);

                        return {
                            role: 'user',
                            content: (msg.content || '') + fileContext
                        };
                    }

                    return {
                        role: msg.role,
                        content: msg.content || ''
                    };
                });
        },
        async streamAIResponse(conv) {
            this.abortController = new AbortController();
            const aiMessage = {role: 'assistant', content: '', thinking: ''};
            conv.messages.push(aiMessage);
            const container = document.getElementById('chatMessages');
            const inner = container.querySelector('.messages-inner') || container;
            const node = document.createElement('article');
            node.className = 'message-row assistant';
            node.innerHTML = '' + '<div class="avatar">AI</div>' + '<div class="message-block">' + '<div class="role-label">AI</div>' + '<div class="message-card">' + '<div class="thinking-section" id="liveThinking" style="display:none;">' + '<button class="thinking-header" onclick="app.toggleThinking(this)">' + '<span>思考过程</span>' + '<span class="thinking-badge" id="liveThinkingBadge">约 0 tokens</span>' + '</button>' + '<div class="thinking-content" id="liveThinkingContent"></div>' + '</div>' + '<div class="response-section" id="liveResponse"></div>' + '</div>' + '<div class="message-actions">' + '<button class="action-btn" onclick="app.copyLatestAssistant(this)">复制</button>' + '</div>' + '</div>';
            inner.appendChild(node);
            container.scrollTop = container.scrollHeight;
            const thinkingSection = document.getElementById('liveThinking');
            const thinkingContent = document.getElementById('liveThinkingContent');
            const thinkingBadge = document.getElementById('liveThinkingBadge');
            const responseDiv = document.getElementById('liveResponse');
            let fullText = '';
            let explicitThinking = '';
            let scheduled = false;
            let finalized = false;
            const paint = (final = false) => {
                if (final) finalized = true;
                scheduled = false;
                const extracted = this.extractThinkingRealtime(fullText);
                const thinking = explicitThinking || extracted.thinking || '';
                const responseText = explicitThinking ? fullText : (extracted.response || (!extracted.thinking ? fullText : ''));
                aiMessage.thinking = thinking;
                aiMessage.content = responseText;
                if (thinking) {
                    thinkingSection.style.display = 'block';
                    thinkingBadge.textContent = '约 ' + this.estimateTokens(thinking) + ' tokens';
                    thinkingContent.innerHTML = final ? this.formatMessage(thinking) : this.formatPlain(thinking);
                }
                responseDiv.innerHTML = final ? this.formatMessage(responseText) : this.formatPlain(responseText);
                container.scrollTop = container.scrollHeight;
            };
            const schedulePaint = () => {
                if (scheduled) return;
                scheduled = true;
                requestAnimationFrame(() => {
                    if (!finalized) paint(false);
                });
            };

            try {
                // 取出准备发给 API 的历史消息（已包含文件文本转换）
                let historyForApi = this.buildApiMessages(conv).slice(0, -1);

                // 【核心新增】根据设置限制携带数量
                const limit = parseInt(this.settings.historyCount, 10) || 0;
                if (limit > 0 && historyForApi.length > limit) {
                    historyForApi = historyForApi.slice(-limit);
                }

                const response = await fetch(this.settings.apiUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': this.settings.apiKey},
                    body: JSON.stringify({
                        model: this.settings.apiModel,
                        messages: [
                            // System 依然永远保持在 [0] 的位置
                            { role: 'system', content: conv.systemPrompt || this.buildFormatSystemPrompt() },
                            ...historyForApi // 放入裁剪后的历史
                        ],
                        stream: true
                    }),
                    signal: this.abortController.signal
                });
                if (!response.ok) throw new Error('HTTP ' + response.status);
                if (!response.body) throw new Error('当前浏览器不支持流式响应');
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, {stream: true});
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const rawLine of lines) {
                        const line = rawLine.trim();
                        if (!line || !line.startsWith('data:')) continue;
                        const data = line.slice(5).trim();
                        if (data === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices?.[0]?.delta || {};
                            const content = delta.content || '';
                            const reasoning = delta.reasoning_content || delta.reasoning || delta.thinking || '';
                            if (reasoning) explicitThinking += reasoning;
                            if (content) fullText += content;
                            if (content || reasoning) schedulePaint();
                        } catch (e) {
                            console.warn('SSE parse error:', e);
                        }
                    }
                }
                paint(true);
            } catch (error) {
                if (error.name === 'AbortError') {
                    aiMessage.content = (aiMessage.content || fullText || '') + '\n\n[已停止回复]';
                } else {
                    aiMessage.content = '错误：' + error.message;
                    this.showNotification('请求失败', 'AI 回复失败：' + error.message);
                }
                responseDiv.innerHTML = this.formatMessage(aiMessage.content);
            } finally {
                this.abortController = null;
            }
        },
        extractThinkingRealtime(text) {
            const value = String(text || '');
            const patterns = [{start: '<think>', end: '</think>'}, {
                start: '<thinking>',
                end: '</thinking>'
            }, {start: '<Think>', end: '</Think>'}];
            for (const pattern of patterns) {
                const startIdx = value.indexOf(pattern.start);
                const endIdx = value.indexOf(pattern.end);
                if (endIdx !== -1) {
                    const thinking = startIdx !== -1 ? value.substring(startIdx + pattern.start.length, endIdx) : value.substring(0, endIdx);
                    const response = value.substring(endIdx + pattern.end.length).trim();
                    return {thinking, response};
                }
                if (startIdx !== -1) {
                    return {thinking: value.substring(startIdx + pattern.start.length), response: ''};
                }
            }
            return {thinking: '', response: value};
        },

        async copyLatestAssistant(button) {

                    let text = conv.messages[i].content || '';
                    if (conv.messages[i].thinking) {
                        text = conv.messages[i].thinking + '\n\n' + text;
                    }
                    await this.copyText(text, button);
                    return;
                }
            }
        },

        handleFileInputChange(event) {
            const files = Array.from(event.target.files || []);

            files.forEach(file => {
                this.pendingFiles.push({
                    id: this.createLocalId(),
                    file
                });
            });

            event.target.value = '';
            this.renderPendingFiles();
        },

        createLocalId() {
            if (window.crypto && crypto.randomUUID) {
                return crypto.randomUUID();
            }

            return Date.now().toString(36) + Math.random().toString(36).slice(2);
        },

        removePendingFile(id) {
            this.pendingFiles = this.pendingFiles.filter(item => item.id !== id);
            this.renderPendingFiles();
        },

        clearPendingFiles() {
            this.pendingFiles = [];
            this.renderPendingFiles();
        },

        renderPendingFiles() {
            const list = document.getElementById('pendingFileList');
            if (!list) return;

            if (!this.pendingFiles.length) {
                list.innerHTML = '';
                return;
            }

            list.innerHTML = this.pendingFiles.map(item => {
                const file = item.file;

                return '' +
                    '<div class="file-chip">' +
                    '<span>📎</span>' +
                    '<span class="file-chip-name" title="' + this.escapeHtml(file.name) + '">' + this.escapeHtml(file.name) + '</span>' +
                    '<span class="file-chip-size">' + this.formatFileSize(file.size) + '</span>' +
                    '<button class="file-chip-remove" type="button" onclick="app.removePendingFile(\'' + item.id + '\')">×</button>' +
                    '</div>';
            }).join('');
        },

        formatFileSize(bytes) {
            if (!bytes) return '0 B';

            const units = ['B', 'KB', 'MB', 'GB'];
            let value = bytes;
            let index = 0;

            while (value >= 1024 && index < units.length - 1) {
                value = value / 1024;
                index++;
            }

            return value.toFixed(value >= 10 || index === 0 ? 0 : 1) + ' ' + units[index];
        },
        async prepareLocalAttachments() {
            if (!this.pendingFiles.length) return [];

            const attachments = [];
            let totalChars = 0;

            for (const item of this.pendingFiles) {
                const result = await this.extractLocalFileText(item.file);

                let text = result.text || '';
                let truncated = false;

                if (text.length > this.maxSingleFileChars) {
                    text = text.slice(0, this.maxSingleFileChars);
                    truncated = true;
                }

                const remaining = this.maxTotalFileChars - totalChars;

                if (remaining <= 0) {
                    attachments.push({
                        local_id: item.id,
                        name: item.file.name,
                        size: item.file.size,
                        type: item.file.type || '',
                        extractedText: '',
                        parseStatus: 'skipped',
                        note: '文件未加入上下文：已达到本次消息的文件内容上限。'
                    });
                    continue;
                }

                if (text.length > remaining) {
                    text = text.slice(0, remaining);
                    truncated = true;
                }

                totalChars += text.length;

                attachments.push({
                    local_id: item.id,
                    name: item.file.name,
                    size: item.file.size,
                    type: item.file.type || '',
                    extractedText: text,
                    parseStatus: result.status,
                    note: result.note || '',
                    truncated,
                    chars: text.length,
                    createdAt: new Date().toISOString()
                });
            }

            return attachments;
        },

        async extractLocalFileText(file) {
            const name = file.name || '';
            const lowerName = name.toLowerCase();

            if (lowerName.endsWith('.pdf') || file.type === 'application/pdf') {
                return await this.extractPdfText(file);
            }

            if (this.isTextLikeFile(file)) {
                const text = await file.text();

                return {
                    status: 'ok',
                    text,
                    note: ''
                };
            }

            return {
                status: 'unsupported',
                text: '',
                note: '暂不支持此文件类型的本地解析。建议转换为 txt、md、csv、json 或 pdf 后再上传。'
            };
        },

        isTextLikeFile(file) {
            const name = (file.name || '').toLowerCase();
            const type = file.type || '';

            if (type.startsWith('text/')) return true;

            const textExts = [
                '.txt', '.md', '.markdown',
                '.json', '.csv', '.tsv',
                '.html', '.htm', '.xml',
                '.js', '.jsx', '.ts', '.tsx',
                '.py', '.java', '.c', '.cpp', '.h', '.hpp',
                '.css', '.scss', '.less',
                '.log', '.yaml', '.yml',
                '.ini', '.conf', '.env'
            ];

            return textExts.some(ext => name.endsWith(ext));
        },
        async ensurePdfJsLoaded() {
            if (window.pdfjsLib) return;

            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                script.onload = resolve;
                script.onerror = () => reject(new Error('PDF 解析库加载失败'));
                document.head.appendChild(script);
            });

            if (!window.pdfjsLib) {
                throw new Error('PDF 解析库不可用');
            }

            window.pdfjsLib.GlobalWorkerOptions.workerSrc =
                'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        },

        async extractPdfText(file) {
            try {
                await this.ensurePdfJsLoaded();

                const arrayBuffer = await file.arrayBuffer();

                const pdf = await window.pdfjsLib.getDocument({
                    data: arrayBuffer
                }).promise;

                const totalPages = Math.min(pdf.numPages, this.maxPdfPages);
                const chunks = [];

                for (let pageNumber = 1; pageNumber <= totalPages; pageNumber++) {
                    const page = await pdf.getPage(pageNumber);
                    const content = await page.getTextContent();

                    const pageText = content.items
                        .map(item => item.str || '')
                        .join(' ')
                        .replace(/\s+/g, ' ')
                        .trim();

                    if (pageText) {
                        chunks.push('--- PDF 第 ' + pageNumber + ' 页 ---\n' + pageText);
                    }
                }

                const note = pdf.numPages > totalPages
                    ? 'PDF 页数较多，仅解析前 ' + totalPages + ' 页。'
                    : '';

                return {
                    status: 'ok',
                    text: chunks.join('\n\n'),
                    note
                };
            } catch (error) {
                return {
                    status: 'failed',
                    text: '',
                    note: 'PDF 解析失败：' + error.message
                };
            }
        },
        buildAttachmentPrompt(attachments) {
            if (!attachments || !attachments.length) return '';

            const blocks = attachments.map((file, index) => {
                const title = [
                    '文件 ' + (index + 1),
                    '文件名：' + (file.name || '未命名'),
                    '大小：' + this.formatFileSize(file.size || 0),
                    '解析状态：' + (file.parseStatus || 'unknown')
                ];

                if (file.note) {
                    title.push('备注：' + file.note);
                }

                if (file.truncated) {
                    title.push('注意：该文件内容较长，已截断。');
                }

                const body = file.extractedText
                    ? file.extractedText
                    : '[没有可用的文本内容]';

                return title.join('\n') + '\n\n```text\n' + body + '\n```';
            });

            return '\n\n以下是用户上传文件的本地文本提取内容。请把这些文件内容作为上下文参考：\n\n' + blocks.join('\n\n');
        },
        downloadFile(filename, content) {
            const blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        },
        buildFormatSystemPrompt() {
            return `
        你是顶级的 UI/UX 设计师和前端开发专家。从现在起，请彻底放弃使用 Markdown 格式，**完全使用结构化、精美设计的 HTML 代码片段**来回复我。

        【排版与 UI 规范】
        - 必须输出纯 HTML 片段，绝对禁止使用 \`\`\`html 包裹，也不要输出 <!DOCTYPE>、<html> 或 <body>。
        - 使用现代 Web 设计语言：采用信息卡片 (div)、柔和阴影、圆角、合理的内外边距和栅格/Flex布局来组织内容。
        - **深浅色主题兼容（致命要求）**：绝对禁止写死具体的颜色值（如 #000, #fff, black, white 等）。必须统一使用系统自带的 CSS 变量：
          - 文本颜色：var(--text) 或 var(--muted)
          - 背景颜色：var(--panel) 或 var(--page) 或 var(--panel-muted)
          - 边框颜色：var(--line) 或 var(--line-soft)
          - 强调色：var(--blue) 或 var(--blue-soft)

        【代码块必须严格遵循的格式】
        为了让前端代码高亮和“复制”按钮正常工作，只要涉及代码展示，**必须严格**使用以下结构嵌套，不要附带任何额外的包裹：
        <pre style="margin:16px 0; border:1px solid var(--line-soft); border-radius:12px; background:var(--page);"><code class="language-[你的语言名称]">
        // 你的具体代码（必须转义 <, >, & 等字符）
        </code></pre>

        【其他要求】
        - 使用 <h2>, <h3> 替代 Markdown 标题，并加上精美的下边框或强调色。
        - 遇到步骤、列表或对比时，优先使用具有视觉层级的 <dl>, <ul>, <table> 或 Flex 卡片阵列。
        - 可以使用内联样式 style="..." 来实现特定的排版需求。
        `.trim();
        },

        createSafeMarkedRenderer() {
            const renderer = new marked.Renderer();

            // 链接安全处理
            renderer.link = ({ href, title, tokens }) => {
                const text = this.safeParseInlineTokens(tokens);
                const safeHref = this.sanitizeUrl(href);
                const t = title ? ` title="${this.escapeHtml(title)}"` : '';
                return `<a href="${safeHref}" target="_blank" rel="noopener noreferrer nofollow"${t}>${text}</a>`;
            };

            return renderer;
        },

        safeParseInlineTokens(tokens) {
            try {
                return marked.Parser.parseInline(tokens || []);
            } catch (e) {
                return '';
            }
        },

        sanitizeUrl(url) {
            if (!url) return '#';
            const trimmed = String(url).trim();
            // 禁止 javascript: 等危险协议
            if (/^(javascript|data|vbscript):/i.test(trimmed)) return '#';
            return this.escapeHtml(trimmed);
        },

        renderAssistantContent(rawText) {
            const source = rawText || '';
            const html = marked.parse(source, {
                breaks: true,
                gfm: true,
                headerIds: false,
                mangle: false
            });
            const normalized = this.normalizeThemeUnsafeColors(html);

            // 允许“局部 HTML 片段”，但严格净化
            const safeHtml = DOMPurify.sanitize(normalized, {
              ALLOWED_TAGS: ['div','span','p','br','strong','em','ul','ol','li','h2','h3','pre','code','table','tr','td','th','details','summary','style','a'],
              ALLOWED_ATTR: ['class','href','target','rel','style']
            });


            return `<div class="ai-html">${safeHtml}</div>`;
        },


        normalizeThemeUnsafeColors(html) {
          if (!html) return html;
          return html
            // 常见写死颜色替换
            .replace(/#000000|#000\b|black\b/gi, 'var(--text)')
            .replace(/#ffffff|#fff\b|white\b/gi, 'var(--panel)')
            // 常见 Tailwind 深浅固定色（可按需继续补）
            .replace(/#111827/gi, 'var(--text)')
            .replace(/#e5e7eb/gi, 'var(--line-soft)');
        },

        renderUserContent(rawText) {
            // 用户消息通常按纯文本更稳
            const text = this.escapeHtml(rawText || '');
            return text.replace(/\n/g, '<br>');
        },

        enhanceCodeCopy(container) {
            if (!container) return;
            const codeBlocks = container.querySelectorAll('pre code');

            codeBlocks.forEach(code => {
                const pre = code.parentElement;
                if (!pre) return;

                // 防止重复增强
                if (pre.parentElement && pre.parentElement.classList.contains('code-block')) {
                    return;
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'code-block';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                const copyBtn = document.createElement('button');
                copyBtn.type = 'button';
                copyBtn.className = 'code-copy-btn';
                copyBtn.textContent = '⧉';
                copyBtn.title = '复制代码';

                copyBtn.addEventListener('click', async () => {
                    try {
                        await navigator.clipboard.writeText(code.innerText || '');
                        copyBtn.classList.add('copied');
                        copyBtn.textContent = '✓';
                        setTimeout(() => {
                            copyBtn.classList.remove('copied');
                            copyBtn.textContent = '⧉';
                        }, 1200);
                    } catch (e) {
                        copyBtn.textContent = '!';
                        setTimeout(() => (copyBtn.textContent = '⧉'), 1200);
                    }
                });

                wrapper.appendChild(copyBtn);
            });
        },

        renderMessageContent(message, cardEl) {
            if (message.role === 'assistant') {
                const rawText = message.content || '';
                const conv = this.getCurrentConversation();

                // 【核心逻辑】如果用户写了专属 Prompt，恢复 marked 解析；否则直接输出原生 HTML
                let htmlContent = rawText;
                if (conv && conv.systemPrompt && window.marked) {
                    htmlContent = marked.parse(rawText, { breaks: true, gfm: true });
                }

                // 强大的 DOMPurify 配置，兼顾 Markdown 生成的标签和系统默认生成的精美 HTML
                const safe = window.DOMPurify ? DOMPurify.sanitize(htmlContent, {
                    ALLOWED_TAGS: [
                        'div','span','p','br','hr','h1','h2','h3','h4','h5','h6',
                        'ul','ol','li','dl','dt','dd','strong','em','b','i','kbd',
                        'blockquote','pre','code','table','thead','tbody','tr','th','td',
                        'details','summary','a','style','section','article','aside',
                        'svg','path','g','circle','rect'
                    ],
                    ALLOWED_ATTR: ['class','style','href','target','rel','title','viewBox','fill','stroke','d']
                }) : htmlContent;

                cardEl.innerHTML = `<div class="ai-html">${safe}</div>`;
                this.enhanceCodeCopy(cardEl); // 依然保留你的代码块复制能力
            } else {
                cardEl.innerHTML = this.escapeHtml(message.content || '').replace(/\n/g, '<br>');
            }
        },



    };
    app.init(); </script>

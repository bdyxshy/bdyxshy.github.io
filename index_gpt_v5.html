                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': this.settings.apiKey},
                    body: JSON.stringify({
                        model: this.settings.apiModel,
                        messages: this.buildApiMessages(conv).slice(0, -1),
                        stream: true
                    }),
                    signal: this.abortController.signal
                });
                if (!response.ok) throw new Error('HTTP ' + response.status);
                if (!response.body) throw new Error('当前浏览器不支持流式响应');
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, {stream: true});
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const rawLine of lines) {
                        const line = rawLine.trim();
                        if (!line || !line.startsWith('data:')) continue;
                        const data = line.slice(5).trim();
                        if (data === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices?.[0]?.delta || {};
                            const content = delta.content || '';
                            const reasoning = delta.reasoning_content || delta.reasoning || delta.thinking || '';
                            if (reasoning) explicitThinking += reasoning;
                            if (content) fullText += content;
                            if (content || reasoning) schedulePaint();
                        } catch (e) {
                            console.warn('SSE parse error:', e);
                        }
                    }
                }
                paint(true);
            } catch (error) {
                if (error.name === 'AbortError') {
                    aiMessage.content = (aiMessage.content || fullText || '') + '\n\n[已停止回复]';
                } else {
                    aiMessage.content = '错误：' + error.message;
                    this.showNotification('请求失败', 'AI 回复失败：' + error.message);
                }
                responseDiv.innerHTML = this.formatMessage(aiMessage.content);
            } finally {
                this.abortController = null;
            }
        },
        extractThinkingRealtime(text) {
            const value = String(text || '');
            const patterns = [{start: '<think>', end: '</think>'}, {
                start: '<thinking>',
                end: '</thinking>'
            }, {start: '<Think>', end: '</Think>'}];
            for (const pattern of patterns) {
                const startIdx = value.indexOf(pattern.start);
                const endIdx = value.indexOf(pattern.end);
                if (endIdx !== -1) {
                    const thinking = startIdx !== -1 ? value.substring(startIdx + pattern.start.length, endIdx) : value.substring(0, endIdx);
                    const response = value.substring(endIdx + pattern.end.length).trim();
                    return {thinking, response};
                }
                if (startIdx !== -1) {
                    return {thinking: value.substring(startIdx + pattern.start.length), response: ''};
                }
            }
            return {thinking: '', response: value};
        },

        async copyLatestAssistant(button) {
            const conv = this.getCurrentConversation();
            if (!conv) return;
            for (let i = conv.messages.length - 1; i >= 0; i--) {
                if (conv.messages[i].role === 'assistant') {
                    let text = conv.messages[i].content || '';
                    if (conv.messages[i].thinking) {
                        text = conv.messages[i].thinking + '\n\n' + text;
                    }
                    await this.copyText(text, button);
                    return;
                }
            }
        },
        toggleThinking(button) {
            const content = button.nextElementSibling;
            if (!content) return;
            content.classList.toggle('collapsed');
        },
        stopStreaming() {
            if (this.abortController) {
                this.abortController.abort();
            }
        },
        autoResizeTextarea() {
            const textarea = document.getElementById('messageInput');
            textarea.addEventListener('input', function () {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 180) + 'px';
            });
            textarea.addEventListener('keydown', event => {
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    this.sendMessage();
                }
            });
        },
        showNotification(title, message) {
            document.getElementById('notificationTitle').textContent = title;
            document.getElementById('notificationMessage').textContent = message;
            document.getElementById('notificationModal').classList.add('active');
        },
        closeNotification() {
            document.getElementById('notificationModal').classList.remove('active');
        },
        showConfirm(message, callback) {
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmBtn').onclick = () => {
                callback();
                this.closeConfirm();
            };
            document.getElementById('confirmModal').classList.add('active');
        },
        closeConfirm() {
            document.getElementById('confirmModal').classList.remove('active');
        },
        handleFileInputChange(event) {
            const files = Array.from(event.target.files || []);

            files.forEach(file => {
                this.pendingFiles.push({
                    id: this.createLocalId(),
                    file
                });
            });

            event.target.value = '';
            this.renderPendingFiles();
        },

        createLocalId() {
            if (window.crypto && crypto.randomUUID) {
                return crypto.randomUUID();
            }

            return Date.now().toString(36) + Math.random().toString(36).slice(2);
        },

        removePendingFile(id) {
            this.pendingFiles = this.pendingFiles.filter(item => item.id !== id);
            this.renderPendingFiles();
        },

        clearPendingFiles() {
            this.pendingFiles = [];
            this.renderPendingFiles();
        },

        renderPendingFiles() {
            const list = document.getElementById('pendingFileList');
            if (!list) return;

            if (!this.pendingFiles.length) {
                list.innerHTML = '';
                return;
            }

            list.innerHTML = this.pendingFiles.map(item => {
                const file = item.file;

                return '' +
                    '<div class="file-chip">' +
                    '<span>📎</span>' +
                    '<span class="file-chip-name" title="' + this.escapeHtml(file.name) + '">' + this.escapeHtml(file.name) + '</span>' +
                    '<span class="file-chip-size">' + this.formatFileSize(file.size) + '</span>' +
                    '<button class="file-chip-remove" type="button" onclick="app.removePendingFile(\'' + item.id + '\')">×</button>' +
                    '</div>';
            }).join('');
        },

        formatFileSize(bytes) {
            if (!bytes) return '0 B';

            const units = ['B', 'KB', 'MB', 'GB'];
            let value = bytes;
            let index = 0;

            while (value >= 1024 && index < units.length - 1) {
                value = value / 1024;
                index++;
            }

            return value.toFixed(value >= 10 || index === 0 ? 0 : 1) + ' ' + units[index];
        },
        async prepareLocalAttachments() {
            if (!this.pendingFiles.length) return [];

            const attachments = [];
            let totalChars = 0;

            for (const item of this.pendingFiles) {
                const result = await this.extractLocalFileText(item.file);

                let text = result.text || '';
                let truncated = false;

                if (text.length > this.maxSingleFileChars) {
                    text = text.slice(0, this.maxSingleFileChars);
                    truncated = true;
                }

                const remaining = this.maxTotalFileChars - totalChars;

                if (remaining <= 0) {
                    attachments.push({
                        local_id: item.id,
                        name: item.file.name,
                        size: item.file.size,
                        type: item.file.type || '',
                        extractedText: '',
                        parseStatus: 'skipped',
                        note: '文件未加入上下文：已达到本次消息的文件内容上限。'
                    });
                    continue;
                }

                if (text.length > remaining) {
                    text = text.slice(0, remaining);
                    truncated = true;
                }

                totalChars += text.length;

                attachments.push({
                    local_id: item.id,
                    name: item.file.name,
                    size: item.file.size,
                    type: item.file.type || '',
                    extractedText: text,
                    parseStatus: result.status,
                    note: result.note || '',
                    truncated,
                    chars: text.length,
                    createdAt: new Date().toISOString()
                });
            }

            return attachments;
        },

        async extractLocalFileText(file) {
            const name = file.name || '';
            const lowerName = name.toLowerCase();

            if (lowerName.endsWith('.pdf') || file.type === 'application/pdf') {
                return await this.extractPdfText(file);
            }

            if (this.isTextLikeFile(file)) {
                const text = await file.text();

                return {
                    status: 'ok',
                    text,
                    note: ''
                };
            }

            return {
                status: 'unsupported',
                text: '',
                note: '暂不支持此文件类型的本地解析。建议转换为 txt、md、csv、json 或 pdf 后再上传。'
            };
        },

        isTextLikeFile(file) {
            const name = (file.name || '').toLowerCase();
            const type = file.type || '';

            if (type.startsWith('text/')) return true;

            const textExts = [
                '.txt', '.md', '.markdown',
                '.json', '.csv', '.tsv',
                '.html', '.htm', '.xml',
                '.js', '.jsx', '.ts', '.tsx',
                '.py', '.java', '.c', '.cpp', '.h', '.hpp',
                '.css', '.scss', '.less',
                '.log', '.yaml', '.yml',
                '.ini', '.conf', '.env'
            ];

            return textExts.some(ext => name.endsWith(ext));
        },
        async ensurePdfJsLoaded() {
            if (window.pdfjsLib) return;

            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                script.onload = resolve;
                script.onerror = () => reject(new Error('PDF 解析库加载失败'));
                document.head.appendChild(script);
            });

            if (!window.pdfjsLib) {
                throw new Error('PDF 解析库不可用');
            }

            window.pdfjsLib.GlobalWorkerOptions.workerSrc =
                'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        },

        async extractPdfText(file) {
            try {
                await this.ensurePdfJsLoaded();

                const arrayBuffer = await file.arrayBuffer();

                const pdf = await window.pdfjsLib.getDocument({
                    data: arrayBuffer
                }).promise;

                const totalPages = Math.min(pdf.numPages, this.maxPdfPages);
                const chunks = [];

                for (let pageNumber = 1; pageNumber <= totalPages; pageNumber++) {
                    const page = await pdf.getPage(pageNumber);
                    const content = await page.getTextContent();

                    const pageText = content.items
                        .map(item => item.str || '')
                        .join(' ')
                        .replace(/\s+/g, ' ')
                        .trim();

                    if (pageText) {
                        chunks.push('--- PDF 第 ' + pageNumber + ' 页 ---\n' + pageText);
                    }
                }

                const note = pdf.numPages > totalPages
                    ? 'PDF 页数较多，仅解析前 ' + totalPages + ' 页。'
                    : '';

                return {
                    status: 'ok',
                    text: chunks.join('\n\n'),
                    note
                };
            } catch (error) {
                return {
                    status: 'failed',
                    text: '',
                    note: 'PDF 解析失败：' + error.message
                };
            }
        },
        buildAttachmentPrompt(attachments) {
            if (!attachments || !attachments.length) return '';

            const blocks = attachments.map((file, index) => {
                const title = [
                    '文件 ' + (index + 1),
                    '文件名：' + (file.name || '未命名'),
                    '大小：' + this.formatFileSize(file.size || 0),
                    '解析状态：' + (file.parseStatus || 'unknown')
                ];

                if (file.note) {
                    title.push('备注：' + file.note);
                }

                if (file.truncated) {
                    title.push('注意：该文件内容较长，已截断。');
                }

                const body = file.extractedText
                    ? file.extractedText
                    : '[没有可用的文本内容]';

                return title.join('\n') + '\n\n```text\n' + body + '\n```';
            });

            return '\n\n以下是用户上传文件的本地文本提取内容。请把这些文件内容作为上下文参考：\n\n' + blocks.join('\n\n');
        },
        downloadFile(filename, content) {
            const blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

    };
    app.init(); </script>
